<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    /* warmer, brighter, higher contrast than the old parchment */
    --bg:#FDF7F8;
    --card:#FFFFFF;
    --card-2:#FFF4F6;

    --rose:#C2185B;          /* punchier — reads on a bright screen */
    --rose-dk:#8E1147;
    --rose-lt:#F06292;
    --blush:#FCE4EC;
    --blush-2:#F8BBD0;

    --gold:#C99000;
    --gold-lt:#FFC93C;
    --gold-bg:#FFF8E1;

    --ink:#2B2028;           /* near-black, not brown — much crisper */
    --ink-2:#5C4F58;         /* readable secondary, NOT washed out */
    --ink-3:#8B7E86;

    --line:#F0DDE3;

    --disp:"Playfair Display",Georgia,serif;
    --ui:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{overflow-x:hidden;max-width:100%;}
  input,textarea,select{font-size:16px;}

  body{
    margin:0;
    font-family:var(--ui);
    font-size:17px;
    line-height:1.55;
    color:var(--ink);
    background:var(--bg);
    padding-bottom:90px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:600px;margin:0 auto;padding:0 16px;}

  /* ============ COVER ============ */
  .cover{
    background:linear-gradient(160deg,#D81B60 0%,#AD1457 55%,#880E4F 100%);
    color:#fff;
    padding:30px 0 26px;
    position:relative;overflow:hidden;
    border-radius:0 0 28px 28px;
    box-shadow:0 8px 28px rgba(194,24,91,.28);
  }
  .cover::before{
    content:"❄";position:absolute;right:-24px;top:-32px;
    font-size:190px;opacity:.09;line-height:1;pointer-events:none;
  }
  .cover::after{
    content:"✿";position:absolute;left:-26px;bottom:-46px;
    font-size:170px;opacity:.07;line-height:1;pointer-events:none;
  }
  .cover-top{
    font-family:var(--ui);font-size:11px;font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;
    color:rgba(255,255,255,.72);text-align:center;margin:0 0 14px;
  }
  .cover h1{
    font-family:var(--disp);font-size:42px;font-weight:700;
    text-align:center;margin:0;line-height:1.1;letter-spacing:-.01em;
  }
  .cover-sub{
    font-family:var(--ui);font-size:15px;font-weight:600;
    text-align:center;color:rgba(255,255,255,.85);margin:6px 0 22px;
    letter-spacing:.02em;
  }

  /* curtain / progress */
  .curtain-wrap{padding:0 20px;}
  .curtain-label{
    display:flex;justify-content:space-between;align-items:center;
    font-size:13px;font-weight:700;color:rgba(255,255,255,.8);
    margin-bottom:9px;letter-spacing:.02em;
  }
  .curtain-track{
    height:14px;background:rgba(0,0,0,.22);
    border-radius:99px;position:relative;overflow:hidden;
  }
  .curtain-fill{
    height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--gold-lt),#FFE082);
    transition:width .7s cubic-bezier(.34,1.2,.64,1);
    box-shadow:0 0 12px rgba(255,201,60,.5);
  }
  .curtain-ghost{
    position:absolute;top:0;left:0;height:100%;border-radius:99px;
    background:rgba(255,255,255,.28);
    transition:width .7s cubic-bezier(.34,1.2,.64,1);
  }
  .curtain-status{
    font-size:15px;font-weight:600;color:#fff;
    text-align:center;margin:12px 0 0;
  }

  /* ============ CREDITS ============ */
  .credits-card{
    display:block;width:calc(100% - 32px);
    background:var(--card);border:0;
    margin:-16px 16px 0;
    padding:18px 18px 16px;
    border-radius:20px;
    box-shadow:0 4px 20px rgba(194,24,91,.12);
    position:relative;z-index:2;cursor:pointer;
    font:inherit;color:inherit;text-align:center;
  }
  .credits-card:active{transform:scale(.985);}
  .credits-card::after{
    content:"\21bb";position:absolute;top:12px;right:14px;
    font-size:14px;color:var(--blush-2);
  }
  .credits-eyebrow{
    font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;
    color:var(--rose);margin:0 0 6px;text-align:center;
  }
  .credits-lead{
    font-family:var(--disp);font-size:20px;font-weight:600;
    color:var(--ink);text-align:center;margin:0 0 12px;line-height:1.3;
  }
  .credits-badges{
    display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
    list-style:none;margin:0;padding:0;
  }
  .credits-badges li{
    font-size:14px;font-weight:600;color:var(--rose);
    background:var(--blush);padding:6px 12px;border-radius:99px;
  }
  .credits-badges li.eagle{
    background:var(--gold-bg);color:var(--gold);
  }
  .credits-note{
    font-size:14px;color:var(--ink-2);text-align:center;
    margin:10px 0 0;line-height:1.45;font-weight:500;
  }
  .credits-note b{color:var(--rose);}
  .credits-lead{min-height:52px;display:flex;align-items:center;justify-content:center;}

  .program-body{padding-top:22px;}

  /* ============ CARDS ============ */
  .panel{
    background:var(--card);
    border-radius:20px;
    padding:20px 18px 14px;
    margin-bottom:18px;
    box-shadow:0 2px 14px rgba(43,32,40,.06);
  }
  .panel h2{
    font-family:var(--disp);font-size:20px;font-weight:700;
    color:var(--ink);margin:0 0 4px;
  }
  .panel-hint{font-size:15px;color:var(--ink-2);margin:0 0 16px;line-height:1.5;}

  /* progress bars */
  .bar{margin-bottom:15px;}
  .bar-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .bar-lab{font-size:15px;font-weight:600;color:var(--ink);}
  .bar-lab small{color:var(--ink-3);font-weight:500;font-size:13px;}
  .bar-val{margin-left:auto;font-size:15px;font-weight:800;white-space:nowrap;}
  .bar-val.met{color:var(--rose);}
  .bar-val.short{color:var(--gold);}
  .bar-track{height:9px;background:var(--line);border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;background:var(--rose);transition:width .55s cubic-bezier(.34,1.2,.64,1);}
  .bar-fill.short{background:var(--gold-lt);}
  .bar-note{font-size:13.5px;color:var(--ink-2);margin-top:5px;line-height:1.45;}

  /* outings */
  #outingList{margin-top:6px;}
  .outing{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    padding:12px 0;border:0;border-top:1px solid var(--line);
    background:none;font:inherit;color:inherit;cursor:pointer;border-radius:10px;
  }
  .outing:active{background:var(--blush);}
  .nights{
    flex:0 0 auto;width:44px;height:44px;border-radius:14px;
    background:var(--rose);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    line-height:1;
  }
  .nights b{font-size:16px;font-weight:800;}
  .nights span{font-size:8.5px;font-weight:700;letter-spacing:.06em;opacity:.85;margin-top:2px;}
  .nights.day{background:var(--line);color:var(--ink-3);}
  .nights.long{background:var(--gold-lt);color:#5C4200;}
  .outing-body{flex:1;min-width:0;}
  .outing-name{font-size:15.5px;font-weight:600;line-height:1.3;}
  .outing-meta{font-size:13.5px;color:var(--ink-3);margin-top:2px;font-weight:500;}
  .outing.planned{opacity:.55;}
  .chev{flex:0 0 auto;color:var(--blush-2);font-size:20px;font-weight:700;}

  .add-btn{
    width:100%;margin-top:14px;padding:15px;
    border:2px dashed var(--blush-2);border-radius:16px;
    background:none;color:var(--rose);cursor:pointer;
    font-family:var(--ui);font-size:15px;font-weight:700;
  }
  .add-btn:active{background:var(--blush);}

  .add-form{
    background:var(--card-2);border-radius:16px;padding:16px;margin-top:14px;
  }
  .add-form input{
    width:100%;padding:14px;margin-bottom:10px;
    border:1.5px solid var(--line);border-radius:12px;
    background:#fff;font-family:var(--ui);font-size:16px;color:var(--ink);
  }
  .add-form input:focus{outline:none;border-color:var(--rose-lt);}
  .night-row{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 12px;}
  .night-lab{font-size:15px;font-weight:600;}
  .stepper{display:flex;align-items:center;gap:8px;}
  .stepper button{
    width:44px;height:44px;border:0;border-radius:14px;
    background:var(--blush);color:var(--rose);
    font-size:22px;font-weight:700;cursor:pointer;line-height:1;
  }
  .stepper button:active{background:var(--blush-2);}
  .night-n{font-size:19px;font-weight:800;min-width:34px;text-align:center;}
  .toggles{display:flex;gap:9px;}
  .toggle{
    flex:1;padding:14px 6px;border:0;border-radius:14px;
    background:var(--line);color:var(--ink-2);
    font-family:var(--ui);font-size:14px;font-weight:700;cursor:pointer;
  }
  .toggle[aria-pressed="true"]{background:var(--rose);color:#fff;}
  #oPlanned[aria-pressed="true"]{background:var(--gold-lt);color:#5C4200;}
  .form-actions{display:flex;gap:9px;margin-top:12px;}
  .btn-ghost,.btn-solid,.btn-del{
    padding:15px;border:0;border-radius:14px;cursor:pointer;
    font-family:var(--ui);font-size:15px;font-weight:700;
  }
  .btn-ghost{flex:1;background:var(--line);color:var(--ink-2);}
  .btn-solid{flex:1;background:var(--rose);color:#fff;}
  .btn-del{background:var(--blush);color:var(--rose);}

  /* ============ TABS ============ */
  .prog-tabs{
    display:flex;gap:7px;margin-bottom:16px;
  }
  .prog-tabs button{
    flex:1;padding:12px 4px;border:0;border-radius:14px;
    background:var(--card);color:var(--ink-2);cursor:pointer;
    font-family:var(--ui);font-size:12.5px;font-weight:700;
    box-shadow:0 1px 6px rgba(43,32,40,.05);
  }
  .prog-tabs button b{
    display:block;font-size:18px;font-weight:800;margin-top:2px;
  }
  .prog-tabs button[aria-pressed="true"]{background:var(--rose);color:#fff;}
  .prog-tabs button[data-f="ready"][aria-pressed="true"]{background:var(--gold-lt);color:#5C4200;}

  .legend{
    display:flex;gap:14px;flex-wrap:wrap;font-size:13px;font-weight:600;
    color:var(--ink-2);margin:0 0 20px;padding:0 4px;
  }
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;}
  .dot.n{border:2px solid var(--blush-2);}
  .dot.r{background:var(--gold-lt);}
  .dot.d{background:var(--rose);}

  /* ============ ACTS ============ */
  .act-head{
    display:flex;align-items:center;gap:12px;margin:26px 0 10px;
  }
  .act-head::before,.act-head::after{
    content:"";flex:1;height:1.5px;background:var(--line);border-radius:2px;
  }
  .act-head span{
    font-family:var(--disp);font-size:14px;font-weight:600;font-style:italic;
    color:var(--rose);white-space:nowrap;
  }

  .cat{margin-bottom:8px;}
  .cat-head{display:flex;align-items:center;gap:8px;padding:0 2px 4px;}
  .cat-head h3{
    font-family:var(--disp);font-size:23px;font-weight:700;
    color:var(--ink);margin:0;letter-spacing:-.01em;
  }
  .cat-count{
    margin-left:auto;font-size:13px;font-weight:800;
    color:var(--ink-3);white-space:nowrap;
    background:var(--card);padding:5px 10px;border-radius:99px;
  }
  .cat-count em{color:var(--gold);font-style:normal;}

  /* ============ REQUIREMENT CARDS ============ */
  .req{
    display:flex;align-items:flex-start;gap:13px;width:100%;text-align:left;
    padding:16px;margin-bottom:10px;
    background:var(--card);border:0;border-radius:18px;
    cursor:pointer;font:inherit;color:inherit;
    box-shadow:0 2px 10px rgba(43,32,40,.055);
    transition:transform .12s, box-shadow .12s;
  }
  .req:active{transform:scale(.985);}

  .star-bullet{
    flex:0 0 auto;width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;background:var(--line);color:var(--ink-3);
    transition:background .2s, color .2s, transform .2s;
  }
  .req.done{background:var(--blush);}
  .req.done .star-bullet{background:var(--rose);color:#fff;transform:scale(1.06);}
  .req.done .req-txt{color:var(--ink-2);}
  .req.ready{background:var(--gold-bg);box-shadow:0 2px 12px rgba(201,144,0,.18);}
  .req.ready .star-bullet{background:var(--gold-lt);color:#5C4200;animation:beat 2s ease-in-out infinite;}
  @keyframes beat{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

  .req-body{flex:1;min-width:0;}
  .req-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
  .req-num{
    font-size:12px;font-weight:800;color:var(--ink-3);
    background:var(--bg);padding:3px 8px;border-radius:99px;
  }
  .req.done .req-num{background:rgba(255,255,255,.7);}
  .tag{
    font-size:11px;font-weight:800;letter-spacing:.03em;
    padding:4px 9px;border-radius:99px;text-transform:uppercase;
  }
  .tag.ready{background:var(--gold-lt);color:#5C4200;}
  .tag.kayak{background:#B2EBF2;color:#00636E;}
  .tag.quick{background:var(--gold-lt);color:#5C4200;}
  .tag.linked{background:var(--blush);color:var(--rose);}

  .req-txt{font-size:16px;line-height:1.5;font-weight:500;color:var(--ink);}
  .req-note{
    font-size:14.5px;line-height:1.5;color:var(--ink-2);font-weight:500;
    margin-top:9px;padding:10px 12px;
    background:var(--bg);border-radius:12px;
  }
  .req.done .req-note,.req.ready .req-note{background:rgba(255,255,255,.6);}

  .req.linked{cursor:default;}
  .req.linked:active{transform:none;}

  .empty-state{
    text-align:center;padding:40px 20px;
    font-family:var(--disp);font-size:19px;font-style:italic;
    color:var(--ink-3);
  }

  /* ============ FOOTER ============ */
  .foot{margin-top:34px;padding:24px 0 6px;text-align:center;}
  .foot-rule{
    font-size:12px;font-weight:700;letter-spacing:.08em;
    color:var(--ink-3);margin-bottom:16px;
  }
  .foot-row{display:flex;gap:9px;max-width:340px;margin:0 auto 10px;}
  .foot-btn{
    flex:1;padding:15px 6px;border:0;border-radius:14px;
    background:var(--card);color:var(--ink-2);cursor:pointer;
    font-family:var(--ui);font-size:14px;font-weight:700;
    box-shadow:0 1px 6px rgba(43,32,40,.05);
  }
  .foot-btn:active{background:var(--blush);color:var(--rose);}
  .foot-btn.danger{color:var(--rose-lt);}
  .saved{
    font-size:14px;font-weight:700;color:var(--rose);
    margin-top:12px;height:20px;opacity:0;transition:opacity .3s;
  }
  .saved.show{opacity:1;}
  .hidden{display:none;}

  @media (min-width:700px){
    .wrap{max-width:720px;}
    .cover h1{font-size:52px;}
    .req-txt{font-size:17px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

/* ============ ACT TILES ============ */
  .act-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:6px;}

  /* arched cards — a proscenium/stage silhouette, not a blocky square */
  .act-tile{
    background:linear-gradient(180deg,#FFFFFF 0%,#FDF2F6 100%);
    border:0;
    border-radius:110px 110px 24px 24px;
    padding:24px 14px 20px;
    cursor:pointer;font:inherit;color:inherit;position:relative;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    box-shadow:0 4px 18px rgba(194,24,91,.10);
    text-align:center;min-height:196px;justify-content:flex-start;
  }
  .act-tile:active{transform:scale(.97);}

  /* circular progress ring around the icon */
  .at-ring{
    width:74px;height:74px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
  }
  .at-ring-inner{
    width:60px;height:60px;border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:27px;line-height:1;
    box-shadow:inset 0 1px 4px rgba(194,24,91,.08);
  }

  .act-tile .at-name{
    font-family:var(--disp);font-size:18px;font-weight:700;color:var(--ink);
    line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-width:100%;
  }
  .act-tile .at-count{
    font-size:13px;font-weight:700;color:var(--rose);
    background:var(--blush);padding:4px 12px;border-radius:99px;
  }
  .act-tile.clear{
    background:linear-gradient(180deg,#FFF6F9 0%,#FBE0EA 100%);
    box-shadow:0 4px 20px rgba(194,24,91,.18);
  }
  .act-tile.clear .at-count{background:var(--rose);color:#fff;}

  .act-tile .at-turnin{
    position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;
    background:var(--gold-lt);color:#5C4200;font-size:14px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(201,144,0,.4);animation:beat 2s ease-in-out infinite;
  }
  .act-tile .at-badge{position:absolute;top:12px;left:12px;font-size:17px;color:var(--rose);}

  .nextup{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:var(--gold-bg);border:0;border-radius:18px;padding:14px 16px;
    margin-bottom:16px;cursor:pointer;font:inherit;color:inherit;
    box-shadow:0 2px 12px rgba(201,144,0,.16);
  }
  .nextup:active{transform:scale(.985);}
  .nextup .nu-icon{font-size:26px;}
  .nextup .nu-body{flex:1;min-width:0;}
  .nextup .nu-lab{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
  .nextup .nu-main{font-size:15.5px;font-weight:700;color:var(--ink);}
  .nextup .nu-go{font-size:13px;font-weight:800;color:var(--rose);}

  /* ============ ACT DETAIL VIEW ============ */
  .act-back{
    display:flex;align-items:center;gap:8px;background:var(--card);border:0;border-radius:14px;
    padding:12px 16px;margin-bottom:16px;cursor:pointer;font:inherit;color:var(--rose);
    font-weight:700;font-size:14px;box-shadow:0 1px 6px rgba(43,32,40,.05);
  }
  .act-hero{
    display:flex;align-items:center;gap:14px;padding:16px 18px;margin-bottom:16px;
    background:var(--card);border-radius:20px;box-shadow:0 2px 14px rgba(43,32,40,.06);
  }
  .act-hero .ah-icon{font-size:34px;}
  .act-hero h2{font-family:var(--disp);font-size:19px;font-weight:700;margin:0 0 3px;color:var(--ink);}
  .act-hero .ah-sub{font-size:13.5px;color:var(--ink-3);font-weight:600;}

  .act-clear-msg{
    text-align:center;padding:16px;margin-top:6px;background:var(--blush);border-radius:16px;
    font-family:var(--disp);font-size:16px;font-weight:700;color:var(--rose);
  }

  /* ============ OUTINGS COLLAPSE ============ */
  .panel-top{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .panel-top h2{margin:0;}
  .panel-summary{
    margin-left:auto;font-size:13px;font-weight:700;color:var(--ink-3);white-space:nowrap;
  }
  .panel-toggle{
    background:var(--blush);color:var(--rose);border:0;border-radius:99px;
    padding:8px 14px;font-family:var(--ui);font-size:12.5px;font-weight:800;cursor:pointer;
  }
  .panel-toggle:active{background:var(--blush-2);}
  #outingsInner.hidden{display:none;}

  /* ============ FITNESS CARD ============ */
  .fit-card{background:var(--card-2);border-radius:18px;padding:16px;margin-top:12px;}
  .fit-card h4{font-family:var(--disp);font-size:16px;font-weight:700;margin:0 0 6px;color:var(--ink);}
  .fit-hint{font-size:13.5px;color:var(--ink-2);margin:0 0 12px;line-height:1.45;}
  .fit-target{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
  }
  .fit-target .ft-lab{font-size:13.5px;font-weight:700;color:var(--ink-2);}
  .fit-target .ft-val{font-size:16px;font-weight:800;}
  .fit-target .ft-val.met{color:var(--rose);}
  .fit-target .ft-val.short{color:var(--gold);}
  .fit-bar-track{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:14px;}

<script>


const CHECK_STAR = "✓";   // inside the filled circle
const OPEN_STAR  = "";    // empty circle = not started

const REQS = [
  ["Camping & Outdoor Ethics", [
    ["1b","Explain the potential impacts of camping on the environment and on other outdoor users. Explain why the Outdoor Code and Leave No Trace principles are important.","","kayak"],
  ]],
  ["Cooking", [
    ["2a","Plan a campout menu: 1 breakfast, 1 lunch, 1 dinner — at least 2 cooked. Show how it meets MyPlate.","You did this for Bear Paw — heads up: the signed menu must be the one you cook for 2e. Simplest to re-plan fresh for the kayaking trip and chain 2a–2e off one campout.","kayak"],
    ["2b","Build a budget and food list for that menu, feeding 3+ Scouts. Buy the ingredients.","Your troop runs about $10/Scout for a weekend campout. For 3 Scouts that's a $30 budget — write that down, then list ingredients and prices against it.","kayak"],
    ["2c","Show which pans, utensils, and gear you need to cook and serve those meals.","","kayak"],
    ["2d","Safely handle and store meat, dairy, eggs, and vegetables. Dispose of garbage and waste water properly.","You did this at Bear Paw. Get it signed off — it stands alone.","kayak"],

    ["3d","Use lashings to build a camp gadget or structure.","Idea: a portable ballet barre — two poles lashed horizontally between two uprights or two trees, at the right height for pliés. Real lashing practice under real load, and a great photo.","kayak"],

  ["Navigation", [
    ["4a","Complete a 1-mile orienteering course with map and compass, measuring height or width of designated items.","",""],
    ["4b","Use GPS to find your location, pick a destination, plan the route, and follow it.","You have the Geocaching merit badge — you know this cold. Ask your Scoutmaster to sign it off.","quick"],
  ]],
  ["Nature", [
    ["5a","Identify 10 native plants at your local area or campsite. Photos count.","Take them at the kayaking campsite. You have the Photography merit badge too.","kayak"],
    ["5b","Name two ways to get a weather forecast and explain why they matter for planning.","Look them up for real before the kayaking trip.","kayak"],

    ["6d","Describe how to sit in a boat and why it matters.","Same — Kayaking merit badge covers this.","quick"],
    ["6e","Do a line rescue as both tender and rescuer (victim ~30 ft from shore, deep water).","Ask if the kayaking trip can include rescue practice.","kayak"],

  ["First Aid & Emergencies", [
    ["7a","Bandage a sprained ankle, and injuries to the head, upper arm, and collarbone.","You have the First Aid merit badge — this should come back fast.","quick"],
    ["7b","Carry someone out of a smoke-filled room. Move someone with a sprained ankle 25 yards.","",""],
    ["7c","Name the 5 common signs of a heart attack. Explain CPR steps.","",""],
    ["7d","Name the utilities in your home, their hazards, and what to do in an emergency.","",""],
    ["7e","Write an emergency plan for your home: fire, storm, power outage, water outage.","A rainy-afternoon job. Do it at the kitchen table.",""],
    ["7f","Explain how to get safe drinking water in an emergency.","You have Wilderness Survival — you already know this.","quick"],
  ]],

    ["8a","30+ minutes of activity a day, 5 days a week, for 4 weeks. Keep track.","Four weeks of calendar time. Start it today.",""],
    ["8b","Share what was hard and what went well. Set a goal to keep moving.","",""],
  ]],
  ["Citizenship", [
    ["9a","Meet with an official — judge, elected official, teacher, or principal — and discuss the rights and duties of a citizen.","This one needs scheduling. Ask around at the court of honor.",""],
    ["9b","Investigate a local environmental issue. Tell your patrol what you found and what could be done.","Your Sustainability merit badge gave you a head start.","quick"],
    ["9c","Track the trash you make on one outing. On the next, cut it down. Compare.","Start the tracking half on the kayaking trip.","kayak"],
    ["9d","3 hours of service — different projects from Tenderfoot 7b and Second Class 8e.","You did 4 hours at Hi-Sierra. As long as it's a different project, this is done — get it signed off.","quick"],
  ]],
  ["Leadership", [
    ["10","Tell someone who could join Scouts BSA about what you do. Invite them to an event. Report back to your Scoutmaster.","A court of honor is the easiest thing to bring a friend to.",""],
  ]],
  ["Scout Spirit & Sign-Off", [
    ["11","Show Scout spirit. Tell how you lived 4 points of the Scout Law — different points than Tenderfoot and Second Class.","Check your old rank sign-offs first so you don't repeat.",""],
    ["12","Sit down for a Scoutmaster conference.","",""],
    ["13","Pass your board of review for First Class. The curtain rises.","",""],
  ]],
];

const TOTAL = REQS.reduce((n,[,items])=>n+items.length,0) + 1; // +1 for 1a (live)

const ACT_META = [
  {label:"Act I",    short:"Camping",    icon:"\u2744\uFE0F"},      // snowflake
  {label:"Act II",   short:"Cooking",    icon:"\uD83C\uDF53"},       // strawberry
  {label:"Act III",  short:"Tools",      icon:"\uD83C\uDF80"},       // ribbon
  {label:"Act IV",   short:"Navigation", icon:"\uD83D\uDCAB"},       // sparkle-star
  {label:"Act V",    short:"Nature",     icon:"\uD83C\uDF37"},       // tulip
  {label:"Act VI",   short:"Aquatics",   icon:"\uD83D\uDC1A"},       // shell
  {label:"Act VII",  short:"First Aid",  icon:"\uD83D\uDC96"},       // sparkling heart
  {label:"Act VIII", short:"Fitness",    icon:"\uD83E\uDE70"},       // ballet shoes
  {label:"Act IX",   short:"Citizenship",icon:"\uD83D\uDD4A\uFE0F"}, // dove
  {label:"Act X",    short:"Leadership", icon:"\uD83D\uDC51"},       // crown
  {label:"Finale",   short:"Finale",     icon:"\uD83C\uDFAD"},       // theatre masks
];
const KEY = "rosie_first_class_v8";

const EVIDENCE = {
  "4b":1,"6a":1,"6c":1,"6d":1,"7a":1,"7f":1,"9b":1,"9d":1,
  "2a":1,"2d":1,
};

const SEED = [
  {id:"c9",name:"Angel Island Bike Camping",        date:"May 18–19, 2024",  nights:1,outdoor:true, planned:false},
  {id:"c8",name:"Beach Camping (troop)",            date:"May 31–Jun 2, 2024",nights:2,outdoor:true, planned:false},
  {id:"c7",name:"Camp Hi-Sierra 2024",              date:"Jul 7–13, 2024",   nights:6,outdoor:true, planned:false},
  {id:"c6",name:"Russian River Canoeing & Camping", date:"Aug 16–18, 2024",  nights:2,outdoor:true, planned:false},
  {id:"c5",name:"Pinnacles Camping",                date:"Sep 20–22, 2024",  nights:2,outdoor:true, planned:false},
  {id:"c4",name:"Fall Backpacking",                 date:"Oct 19–20, 2024",  nights:1,outdoor:true, planned:false},
  {id:"c3",name:"Bear Paw Snow Camping",            date:"Feb 21–23, 2025",  nights:2,outdoor:true, planned:false},
  {id:"c2",name:"Mt. Madonna Campout",              date:"Apr 25–27, 2025",  nights:2,outdoor:true, planned:false},
  {id:"c1",name:"Camp Hi-Sierra 2026",              date:"Jul 5–11, 2026",   nights:6,outdoor:true, planned:false},
  {id:"s2",name:"Court of Honor",                   date:"Upcoming",         nights:0,outdoor:false,planned:true},
  {id:"s3",name:"Kayaking trip",                    date:"Upcoming",         nights:2,outdoor:true, planned:true},
];

let state = {
  done:Object.assign({},EVIDENCE), outings:SEED.slice(),
  act:null,                 // which Act tile is open, or null for the grid
  outingsOpen:false,        // outings list collapsed by default
  fitness:{ plan:"", startDate:"", days:{} },  // 8a: 5 days/wk x 4 wks, from any start date
};

const $ = s => document.querySelector(s);
const st = id => state.done[id] || 0;

// storage — lazy detection, Claude or localStorage
const hasClaudeStore = () =>
  typeof window!=="undefined" && window.storage &&
  typeof window.storage.get==="function";
const store = {
  get: async k => hasClaudeStore() ? window.storage.get(k,true)
    : (v=>v==null?null:{key:k,value:v})(localStorage.getItem(k)),
  set: async (k,v) => hasClaudeStore() ? window.storage.set(k,v,true)
    : (localStorage.setItem(k,v), {key:k,value:v}),
};

async function load(){
  try{
    const r = await store.get(KEY);
    if(r && r.value) state = Object.assign(state, JSON.parse(r.value));
    state.filter = "all";
  }catch(e){}
  render();
}

let saveTimer;
async function save(){
  try{
    const r = await store.set(KEY, JSON.stringify(state));
    if(!r) throw new Error("fail");
    const s=$("#saved"); s.textContent="Saved";
    s.classList.add("show"); clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>s.classList.remove("show"),1400);
  }catch(e){
    const s=$("#saved");
    s.textContent="Not saving here — use Save Backup below";
    s.classList.add("show");
  }
}

const LONG = 5;
function stats(){
  const real = state.outings.filter(o=>!o.planned);
  const shortN = real.filter(o=>o.nights>0&&o.nights<LONG).reduce((s,o)=>s+o.nights,0);
  const longs  = real.filter(o=>o.nights>=LONG).map(o=>o.nights).sort((a,b)=>b-a);
  const longN  = longs.length ? Math.min(6,longs[0])+2*(longs.length-1) : 0;
  return {
    activities: real.length,
    outdoor:    real.filter(o=>o.outdoor).length,
    overnight:  real.filter(o=>o.nights>0).length,
    nights:     shortN+longN,
    rawNights:  real.reduce((s,o)=>s+o.nights,0),
    longs:      longs.length,
  };
}

function req1aState(){
  const s=stats();
  return (s.activities>=10&&s.outdoor>=6&&s.overnight>=3)?2:0;
}

function signedCount(){
  return Object.values(state.done).filter(v=>v===2).length+(req1aState()===2?1:0);
}
function readyCount(){ return Object.values(state.done).filter(v=>v===1).length; }


/* ---------- rotating banner ----------
   Most of these are computed from her real numbers, so they stay true as she
   goes. A few are Scouting quotes / encouragement for variety. */
function buildMessages(){
  const s = stats();
  const signed = signedCount(), ready = readyCount();
  const left = TOTAL - signed - ready;
  const m = [];

  // --- her actual record ---
  m.push({e:"Her record so far", l:"16 merit badges", n:"That's more than the <b>11</b> a Scout needs for <b>Life</b> rank. You are not behind — you're ahead."});
  m.push({e:"Nights under the sky", l:s.nights+" camping nights", n:"Enough for the <b>Camping</b> merit badge, one of the 14 required for Eagle."});
  m.push({e:"Outings logged", l:s.activities+" trips, "+s.overnight+" overnights", n:"Snow camping. Canoeing. Backpacking. Sailing. You've done more than most Scouts twice your age."});
  m.push({e:"Eagle-required badges", l:"First Aid &amp; Sustainability", n:"Two of the 14 Eagle badges already banked. Twelve to go — and you have years."});

  // --- progress-aware ---
  if(ready > 0)
    m.push({e:"Waiting on a signature", l:ready+" requirement"+(ready>1?"s":"")+" already earned", n:"You've <i>done</i> these. They just need a Scoutmaster's pen. Bring the list to your next meeting."});
  if(signed > 0)
    m.push({e:"Signed off", l:signed+" of "+TOTAL+" complete", n:"Every star on this page is something you actually went out and did."});
  if(left > 0 && left <= 10)
    m.push({e:"Almost there", l:"Only "+left+" left to start", n:"First Class is the rank that turns a Scout into a leader. You can see the finish line."});
  if(s.activities >= 10 && s.outdoor >= 6 && s.overnight >= 3)
    m.push({e:"Requirement 1a", l:"Complete", n:"Ten activities, six outdoors, three overnights. Done and dusted."});

  // --- Scouting spirit ---
  m.push({e:"The Scout Motto", l:"Be Prepared", n:"Baden-Powell was asked, \"Prepared for what?\" He said: <i>\"Why, for any old thing.\"</i>"});
  m.push({e:"The Scout Slogan", l:"Do a Good Turn Daily", n:"Not a grand gesture. Just one small, deliberate kindness — every single day."});
  m.push({e:"Baden-Powell", l:"\u201cTry and leave this world a little better than you found it.\u201d", n:"From his last message to Scouts."});
  m.push({e:"On the trail", l:"\u201cThe real way to gain happiness is to give it to others.\u201d", n:"Robert Baden-Powell, founder of Scouting."});
  m.push({e:"Something to remember", l:"A First Class Scout can take care of herself \u2014 and someone else", n:"That's the whole point of this rank. Not badges. Capability."});
  m.push({e:"Why this rank matters", l:"First Class is the turning point", n:"Studies show Scouts who reach First Class in their first year are far more likely to stay — and to reach Eagle."});
  m.push({e:"On the hard ones", l:"The requirements you're dreading are the ones worth doing", n:"Nobody remembers the easy merit badge. You'll remember being head cook."});
  m.push({e:"Ballet &amp; Scouting", l:"Both reward the same thing", n:"Show up. Repeat it until it's yours. Then do it when it counts."});

  return m;
}

let credIdx = 0;
function renderCredits(){
  const msgs = buildMessages();
  if(credIdx >= msgs.length) credIdx = 0;
  const m = msgs[credIdx];
  $("#credEyebrow").innerHTML = m.e;
  $("#credLead").innerHTML = m.l;
  $("#credNote").innerHTML = m.n;
}

function renderCover(){
  const signed=signedCount(), ready=readyCount();
  const C=100;
  $("#curtainFill").style.width  = (signed/TOTAL*C).toFixed(1)+"%";
  $("#curtainGhost").style.width = ((signed+ready)/TOTAL*C).toFixed(1)+"%";
  $("#curtainNum").textContent   = signed+" / "+TOTAL;
  const left=TOTAL-signed-ready;
  if(ready>0){
    $("#curtainStatus").textContent = ready+" ready to sign off · "+left+" still to do";
  } else if(left===0){
    $("#curtainStatus").textContent = "Curtain call — board of review time!";
  } else {
    $("#curtainStatus").textContent =
      Math.round(signed/TOTAL*100)+"% to First Class · "+left+" remaining";
  }
}

const NEEDS=[
  {key:"activities",label:"Activities",           sub:"any troop outing",    need:10},
  {key:"outdoor",   label:"Held outdoors",        sub:"",                    need:6},
  {key:"overnight", label:"Overnight camping",    sub:"",                    need:3},
  {key:"nights",    label:"Camping nights",       sub:"Camping merit badge", need:20},
];
function renderBars(){
  const t=stats();
  $("#counters").innerHTML=NEEDS.map(o=>{
    const have=t[o.key],met=have>=o.need,pct=Math.min(100,(have/o.need)*100).toFixed(1);
    return `<div class="bar">
      <div class="bar-top">
        <span class="bar-lab">${o.label}${o.sub?` <small>· ${o.sub}</small>`:""}</span>
        <span class="bar-val ${met?"met":"short"}">${have} / ${o.need}${met?" ✦":""}</span>
      </div>
      <div class="bar-track"><div class="bar-fill ${met?"":"short"}" style="width:${pct}%"></div></div>
      ${o.key==="nights"&&t.longs>1?`<div class="bar-note">Slept ${t.rawNights} nights total; ${t.longs} long-term camps — best counts 6, each extra counts 2.</div>`:""}
    </div>`;
  }).join("");
}

function renderOutings(){
  const box=$("#outingList");
  const sorted=state.outings.slice().sort((a,b)=>(a.planned?1:0)-(b.planned?1:0));
  box.innerHTML="";
  if(!sorted.length){
    box.innerHTML='<p class="panel-hint" style="margin-top:8px">No outings yet — add them below.</p>';
    return;
  }
  sorted.forEach(o=>{
    const btn=document.createElement("button");
    btn.className="outing"+(o.planned?" planned":"");
    const cls=o.nights===0?"day":o.nights>=LONG?"long":"";
    const badge=o.nights===0
      ?`<div class="nights day"><b>—</b><span>DAY</span></div>`
      :`<div class="nights ${cls}"><b>${o.nights}</b><span>${o.nights===1?"NIGHT":"NIGHTS"}</span></div>`;
    const bits=[o.date];
    if(o.planned) bits.push("not yet");
    if(o.nights>=LONG) bits.push("long-term");
    if(!o.outdoor&&o.nights===0) bits.push("indoor");
    btn.innerHTML=`${badge}
      <span class="outing-body">
        <span class="outing-name">${o.name}</span>
        <span class="outing-meta">${bits.filter(Boolean).join(" · ")}</span>
      </span>
      <span class="chev">›</span>`;
    btn.onclick=()=>openForm(o.id);
    box.appendChild(btn);
  });
}

// outing form
const draft={nights:0,outdoor:false,planned:false};
let editing=null;

function syncDraft(){
  $("#nVal").textContent=draft.nights;
  $("#oOutdoor").setAttribute("aria-pressed",draft.outdoor);
  $("#oPlanned").setAttribute("aria-pressed",draft.planned);
}
function openForm(id){
  editing=id||null;
  const o=id?state.outings.find(x=>x.id===id):null;
  $("#oName").value=o?o.name:"";
  $("#oDate").value=o?o.date:"";
  draft.nights=o?o.nights:0;
  draft.outdoor=o?o.outdoor:true;
  draft.planned=o?o.planned:false;
  syncDraft();
  $("#oSave").textContent=o?"Save changes":"Add it";
  $("#delBtn").classList.toggle("hidden",!o);
  $("#addForm").classList.remove("hidden");
  $("#addBtn").classList.add("hidden");
  if(!o) $("#oName").focus();
}
function closeForm(){
  editing=null;
  $("#addForm").classList.add("hidden");
  $("#addBtn").classList.remove("hidden");
}

$("#nMinus").onclick=()=>{draft.nights=Math.max(0,draft.nights-1);syncDraft();};
$("#nPlus").onclick=()=>{draft.nights++;if(draft.nights)draft.outdoor=true;syncDraft();};
$("#oOutdoor").onclick=()=>{draft.outdoor=!draft.outdoor;syncDraft();};
$("#oPlanned").onclick=()=>{draft.planned=!draft.planned;syncDraft();};
$("#addBtn").onclick=()=>openForm(null);
$("#oCancel").onclick=closeForm;
$("#oSave").onclick=()=>{
  const name=$("#oName").value.trim();
  if(!name){$("#oName").focus();return;}
  const data={name,date:$("#oDate").value.trim(),nights:draft.nights,outdoor:draft.outdoor,planned:draft.planned};
  if(editing) Object.assign(state.outings.find(o=>o.id===editing),data);
  else state.outings.unshift(Object.assign({id:"o"+Date.now()},data));
  closeForm();render();save();
};
$("#delBtn").onclick=()=>{
  state.outings=state.outings.filter(o=>o.id!==editing);
  closeForm();render();save();
};


function render1a(){
  const s=req1aState(), done=s===2;
  const st2=stats();
  const line=`${st2.activities}/10 activities · ${st2.outdoor}/6 outdoors · ${st2.overnight}/3 overnight`;
  return `<div class="req linked ${done?"done":""}">
    <span class="star-bullet">${done?CHECK_STAR:OPEN_STAR}</span>
    <span class="req-body">
      <span class="req-top"><span class="req-num">1a</span><span class="tag linked">Tracked from Outings above</span></span>
      <span class="req-txt">10 troop/patrol activities — 6+ outdoors, 3+ with overnight camping. Pitch your own tent.</span>
      <span class="req-note">${done?"Complete — all three targets met.":"Currently "+line+". Add outings above and this completes itself."}</span>
    </span>
  </div>`;
}


function actStats(i){
  const [cat, items] = REQS[i];
  let total = items.length, signed = items.filter(([id])=>st(id)===2).length,
      ready = items.filter(([id])=>st(id)===1).length;
  if(i === 0){
    total += 1;
    if(req1aState() === 2) signed += 1;
  }
  return {cat, total, signed, ready};
}
function nearestAct(){
  let best = null;
  REQS.forEach((_, i) => {
    const a = actStats(i);
    if(a.signed === a.total) return;
    const left = a.total - a.signed;
    if(!best || left < best.left || (left === best.left && a.signed > best.signed))
      best = {i, left, signed:a.signed};
  });
  return best;
}

function fitISO(d){
  // LOCAL date, not UTC. toISOString() rolls over to tomorrow after ~5pm in
  // California, which would log workouts on the wrong day.
  return d.getFullYear() + "-" +
         String(d.getMonth()+1).padStart(2,"0") + "-" +
         String(d.getDate()).padStart(2,"0");
}
function fitAddDays(iso,n){
  const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n); return fitISO(d);
}
function fitPretty(iso){
  return new Date(iso+"T12:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
function fitDow(iso){
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(iso+"T12:00:00").getDay()];
}

function fitnessHTML(){
  const f = state.fitness;

  if(!f.startDate){
    return `<div class="fit-card">
      <h4>Fitness Log &middot; Requirement 8a</h4>
      <p class="fit-rule"><b>The rule:</b> 30+ active minutes a day, <b>5 days in each week</b>, for <b>4 weeks straight</b>. All four weeks must hit 5 &mdash; a good week can't make up for a short one.</p>
      <p class="fit-plan-lab">Pick the day you start</p>
      <input type="date" class="fit-date" id="fitStart" value="${fitISO(new Date())}">
      <button type="button" class="fit-go" id="fitGo">Start my 4 weeks &rarr;</button>
      <p class="fit-hint">Start any day you like &mdash; Wednesday, Saturday, whatever. Your weeks count from that day, not from Sunday.</p>
    </div>`;
  }

  const today = fitISO(new Date());
  let totalOn = 0, weeksDone = 0, weeksHtml = "";

  for(let w=0; w<4; w++){
    let weekOn=0, cells="", weekEnded=true;
    for(let d=0; d<7; d++){
      const iso = fitAddDays(f.startDate, w*7+d);
      const on = !!f.days[iso];
      const future = iso > today;
      if(future) weekEnded = false;
      if(on){ weekOn++; totalOn++; }
      cells += `<button type="button" class="fit-day ${on?"on":""} ${future?"future":""}"
        ${future?"":`data-fitday="${iso}"`}>
        <span class="fd-dow">${fitDow(iso)}</span>
        <span class="fd-num">${fitPretty(iso).split(" ")[1]}</span>
      </button>`;
    }
    const hit = weekOn >= 5;
    if(hit) weeksDone++;
    const status = hit ? `<span class="wk-pill hit">&#10003; 5 of 5</span>`
      : weekEnded ? `<span class="wk-pill miss">Only ${weekOn} of 5</span>`
      : `<span class="wk-pill open">${weekOn} of 5 so far</span>`;
    const wkStart = fitAddDays(f.startDate, w*7);
    weeksHtml += `<div class="fit-week ${hit?"hit":weekEnded?"miss":""}">
      <div class="fit-week-top">
        <span class="fit-week-lab">Week ${w+1} &middot; from ${fitPretty(wkStart)}</span>
        ${status}
      </div>
      <div class="fit-days">${cells}</div>
    </div>`;
  }

  const allFour = weeksDone === 4;
  return `<div class="fit-card">
    <h4>Fitness Log &middot; Requirement 8a</h4>
    <p class="fit-rule"><b>The rule:</b> 30+ active minutes a day, <b>5 days in each week</b>, for <b>4 weeks straight</b>. All four weeks must hit 5 &mdash; a good week can't make up for a short one.</p>

    <div class="fit-weeks-summary ${allFour?"win":""}">
      <span class="fws-num">${weeksDone}<span>/4</span></span>
      <span class="fws-lab">${allFour?"All four weeks hit 5 days &mdash; 8a is done!":"weeks with 5+ days"}</span>
    </div>

    ${weeksHtml}

    <p class="fit-foot">${totalOn} active days logged &middot; started ${fitPretty(f.startDate)}
      <button type="button" class="fit-reset-date" id="fitResetDate">change start date</button></p>

    <p class="fit-plan-lab">Requirement 8b &middot; Your reflection &amp; goal</p>
    <textarea class="fit-plan" id="fitPlan" rows="3" placeholder="What was hard? What went well? What's your goal for staying active?">${f.plan||""}</textarea>
  </div>`;
}

function wireFitness(){
  const sd = $("#fitStart");
  const go = $("#fitGo");
  // iOS Safari's native date wheel doesn't reliably fire "change" — so accept
  // "input" too, and give an explicit button that never depends on either.
  const commit = () => {
    const v = sd && sd.value;
    if(v){ state.fitness.startDate = v; render(); save(); }
  };
  if(sd){
    sd.onchange = commit;
    sd.oninput  = commit;
  }
  if(go) go.onclick = commit;
  const rd = $("#fitResetDate");
  if(rd) rd.onclick = () => {
    const logged = Object.keys(state.fitness.days).length;
    const msg = logged
      ? `Change your start date?\n\nYou have ${logged} day${logged>1?"s":""} logged. ` +
        `They stay saved on their real dates — but any that fall outside the new ` +
        `4-week window won't count toward 8a.`
      : "Pick a different start date?";
    if(!confirm(msg)) return;
    state.fitness.startDate = "";   // days are NOT wiped
    render(); save();
  };
  document.querySelectorAll("[data-fitday]").forEach(b=>{
    b.onclick = () => {
      const k = b.dataset.fitday;
      if(state.fitness.days[k]) delete state.fitness.days[k];
      else state.fitness.days[k] = true;
      render(); save();
    };
  });
  const p = $("#fitPlan");
  if(p){
    p.oninput  = e => { state.fitness.plan = e.target.value; };
    p.onchange = () => save();
  }
}

function renderTiles(){
  const v = $("#view");
  const near = nearestAct();
  let html = "";
  if(near){
    const a = REQS[near.i][0];
    html += `<button class="nextup" data-act="${near.i}">
      <span class="nu-icon">${ACT_META[near.i].icon}</span>
      <span class="nu-body">
        <span class="nu-lab">Closest to finishing</span>
        <span class="nu-main">${a} &middot; ${near.left} to go</span>
      </span>
      <span class="nu-go">OPEN &rsaquo;</span>
    </button>`;
  }
  html += `<div class="act-grid">`;
  REQS.forEach((_, i) => {
    const a = actStats(i);
    const clear = a.signed === a.total;
    const pct = a.total ? (a.signed/a.total*100) : 0;
    html += `<button class="act-tile ${clear?"clear":""}" data-act="${i}">
      ${clear?'<span class="at-badge">&#9733;</span>':""}
      ${a.ready?`<span class="at-turnin" title="${a.ready} waiting for a signature">&#9998;</span>`:""}
      <span class="at-ring" style="background:conic-gradient(var(--rose) ${pct}%, var(--line) 0);">
        <span class="at-ring-inner">${ACT_META[i].icon}</span>
      </span>
      <span class="at-name">${ACT_META[i].short}</span>
      <span class="at-count">${a.signed}/${a.total}${clear?" &#10003;":""}</span>
    </button>`;
  });
  html += `</div>`;
  v.innerHTML = html;
  v.querySelectorAll("[data-act]").forEach(b => {
    b.onclick = () => { state.act = parseInt(b.dataset.act); render(); save(); };
  });
}

function renderActDetail(i){
  const [cat, items] = REQS[i];
  const a = actStats(i);
  const v = $("#view");
  let html = `<button class="act-back" id="actBack">&larr; All Acts</button>
    <div class="act-hero">
      <span class="ah-icon">${ACT_META[i].icon}</span>
      <span>
        <h2>${ACT_META[i].label} &middot; ${cat}</h2>
        <span class="ah-sub">${a.signed}/${a.total} complete</span>
      </span>
    </div>`;

  if(i === 0) html += render1a();
  items.forEach(([id,text,note,tag]) => { html += reqHTML(id,text,note,tag); });
  if(cat === "Fitness") html += fitnessHTML();
  if(a.signed === a.total) html += `<p class="act-clear-msg">&#9733; ${cat} complete &#9733;</p>`;

  v.innerHTML = html;
  $("#actBack").onclick = () => { state.act = null; render(); save(); };
  v.querySelectorAll("[data-req]").forEach(b => {
    b.onclick = () => {
      const id = b.dataset.req;
      state.done[id] = (st(id)+1) % 3;
      render(); save();
    };
  });
  if(cat === "Fitness") wireFitness();
}

function reqHTML(id,text,note,tag){
  const s=st(id);
  const bullet=s===2?"✓":s===1?"★":"";   // done / awaiting signature / not started
  const tagHtml=s===1?'<span class="tag ready">Needs a signature</span>'
               :tag==="kayak"?'<span class="tag kayak">Kayaking trip</span>'
               :tag==="quick"?'<span class="tag quick">Quick win</span>':"";
  return `<button class="req ${s===2?"done":s===1?"ready":""}" data-req="${id}">
    <span class="star-bullet">${bullet}</span>
    <span class="req-body">
      <span class="req-top"><span class="req-num">${id}</span>${tagHtml}</span>
      <span class="req-txt">${text}</span>
      ${note?`<span class="req-note">${note}</span>`:""}
    </span>
  </button>`;
}

// If she's logged 5+ days in all four weeks, 8a is earned — flag it for a
// signature. Must run BEFORE anything renders, or the 8a card is built stale.
function syncFitnessTo8a(){
  const f = state.fitness;
  if(!f.startDate) return;
  let weeksDone = 0;
  for(let w=0; w<4; w++){
    let n=0;
    for(let d=0; d<7; d++) if(f.days[fitAddDays(f.startDate, w*7+d)]) n++;
    if(n >= 5) weeksDone++;
  }
  if(weeksDone === 4 && st("8a") === 0) state.done["8a"] = 1;
}

function render(){
  syncFitnessTo8a();
  renderCredits();
  renderCover();
  renderBars();
  renderOutings();

  // outings collapse
  const s = stats();
  $("#outSummary").textContent = s.activities + " logged \u00b7 " + s.rawNights + " nights";
  $("#outingsInner").classList.toggle("hidden", !state.outingsOpen);
  $("#outingsToggle").textContent = state.outingsOpen ? "Hide outings" : "Show outings";

  // tiles or a single act's detail
  if(state.act === null || state.act === undefined) renderTiles();
  else renderActDetail(state.act);
}

$("#outingsToggle").onclick = () => {
  state.outingsOpen = !state.outingsOpen;
  render(); save();
};

$("#creditsCard").onclick = () => {
  credIdx++;
  renderCredits();
};

// start on a different message each time she opens the app
credIdx = Math.floor(Math.random() * 8);

$("#reset").onclick=()=>{
  state.done=Object.assign({},EVIDENCE);
  state.outings=SEED.slice();
  state.act=null;
  state.outingsOpen=false;
  state.fitness={plan:"",startDate:"",days:{}};
  render();save();
};

function download(fn,txt){
  const b=new Blob([txt],{type:"application/json"});
  const u=URL.createObjectURL(b);
  const a=document.createElement("a");
  a.href=u;a.download=fn;document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(u);
}
$("#exportBtn").onclick=()=>
  download(`rosie-firstclass-${new Date().toISOString().slice(0,10)}.json`,JSON.stringify(state,null,2));
$("#importBtn").onclick=()=>$("#importFile").click();
$("#importFile").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const l=JSON.parse(rd.result);
      if(!l.done)throw new Error("bad");
      state=Object.assign(state,l);state.filter="all";
      render();save();
    }catch(err){
      const s=$("#saved");s.textContent="Not a valid backup";s.classList.add("show");
    }
  };
  rd.readAsText(f);e.target.value="";
};

// logPanel toggle must exist in DOM
load();
</script>
